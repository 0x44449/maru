spring:
  application:
    name: maru-api

  datasource:
    url: jdbc:postgresql://localhost:35432/maru
    username: maru
    password: maru123
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations:
      - classpath:db/migration
      - classpath:db/procedure

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_JWK_SET_URI:https://your-project.supabase.co/auth/v1/.well-known/jwks.json}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:39000}
  access-key: ${MINIO_ACCESS_KEY:maru}
  secret-key: ${MINIO_SECRET_KEY:maru1234}
  bucket: ${MINIO_BUCKET:maru}

server:
  port: 8080
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
